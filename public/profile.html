<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — Vishop Trader LLP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/global.css" />
  <link rel="stylesheet" href="/css/index.css" />
</head>
<body>
  <div id="header"></div>

  <main class="profile-page">
    <section class="profile-hero">
      <div class="section-tag">Account</div>
      <h1>Welcome back, <span id="profileName">User</span></h1>
      <p class="section-sub">This is your secure profile hub. Manage your account, view your details, and sign out safely.</p>
    </section>

    <div class="profile-card">
      <div class="profile-field">
        <span>Name</span>
        <strong id="profileFullName">-</strong>
      </div>
      <div class="profile-field">
        <span>Email</span>
        <strong id="profileEmail">-</strong>
      </div>
      <div class="profile-field">
        <span>Phone</span>
        <strong id="profilePhone">-</strong>
      </div>
      <div class="profile-field">
        <span>Interested Service</span>
        <strong id="profileService">-</strong>
      </div>
      <div class="profile-actions">
        <a href="/" class="btn-ghost">Home</a>
        <button class="btn-gold" onclick="handleLogout()">Logout</button>
      </div>
    </div>
  </main>

  <script>
  fetch('/header.html')
    .then(response => response.text())
    .then(data => {
      document.getElementById('header').innerHTML = data;
      document.getElementById('services-link').href = '/#services';
      updateNavAuth(); // No active for profile
    });
  </script>
  <script src="/js/theme.js"></script>
  <script src="/js/profile.js"></script>
</body>
</html>
